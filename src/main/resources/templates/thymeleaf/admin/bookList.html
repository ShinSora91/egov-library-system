<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>도서 관리 (관리자)</title>
    <link rel="stylesheet" th:href="@{/css/pagination.css}" />
    <style>
      table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }
      th:nth-child(1) {
        width: 5%;
      }
      th:nth-child(2) {
        width: 25%;
      }
      th:nth-child(3) {
        width: 13%;
      }
      th:nth-child(4) {
        width: 13%;
      }
      th:nth-child(5) {
        width: 18%;
      }
      th:nth-child(6) {
        width: 13%;
      }
      th:nth-child(7) {
        width: 15%;
      }

      td {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h2>도서 관리</h2>
    <a th:href="@{/admin}">← 대시보드</a>
    <a th:href="@{/admin/books/register}">도서 등록</a>

    <div
      th:if="${successMsg}"
      style="color: green"
      th:text="${successMsg}"
    ></div>

    <form th:action="@{/admin/books}" method="get">
      <select name="searchCondition">
        <option
          value="title"
          th:selected="${bookVO.searchCondition == 'title'}"
        >
          도서명
        </option>
        <option
          value="author"
          th:selected="${bookVO.searchCondition == 'author'}"
        >
          저자
        </option>
        <option
          value="publisher"
          th:selected="${bookVO.searchCondition == 'publisher'}"
        >
          출판사
        </option>
      </select>
      <input
        type="text"
        name="searchKeyword"
        th:value="${bookVO.searchKeyword}"
        placeholder="검색어를 입력하세요"
      />
      <button type="submit">검색</button>
      <a th:href="@{/admin/books}">초기화</a>
    </form>

    <table border="1">
      <tr>
        <th>번호</th>
        <th>도서명</th>
        <th>저자</th>
        <th>출판사</th>
        <th>등록일</th>
        <th>재고</th>
        <th>관리</th>
      </tr>
      <tr th:each="book : ${bookList}">
        <td th:text="${book.bookNo}"></td>
        <td th:text="${book.bookTitle}"></td>
        <td th:text="${book.bookAuthor}"></td>
        <td th:text="${book.bookPublisher}"></td>
        <td th:text="${book.registDate}"></td>
        <td th:text="${book.availableStock} + '/' + ${book.totalStock}"></td>
        <td>
          <a
            th:href="@{/admin/books/update/{no}(no=${book.bookNo}, pageIndex=${bookVO.pageIndex})}"
            >수정</a
          >
          <form
            th:action="@{/admin/books/delete/{no}(no=${book.bookNo})}"
            method="post"
            style="display: inline"
          >
            <button
              type="submit"
              onclick="return confirm('삭제하시겠습니까?');"
            >
              삭제
            </button>
          </form>
        </td>
      </tr>
    </table>

    <div
      class="pagination"
      th:utext="${#egovKrdsPaginationRenderer.renderPagination(paginationInfo, 'linkAdminBookPage')}"
    ></div>

    <script>
      function linkAdminBookPage(pageNo) {
        const searchCondition = document.querySelector(
          'select[name="searchCondition"]',
        ).value;
        const searchKeyword = document.querySelector(
          'input[name="searchKeyword"]',
        ).value;
        location.href =
          "/admin/books?pageIndex=" +
          pageNo +
          "&searchCondition=" +
          searchCondition +
          "&searchKeyword=" +
          encodeURIComponent(searchKeyword);
      }
    </script>
  </body>
</html>
