<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>도서 대출 관리 시스템</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #ddd;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .header-buttons {
        display: flex;
        gap: 10px;
      }
      .btn {
        padding: 7px 15px;
        text-decoration: none;
        border: 1px solid #333;
        color: #333;
        cursor: pointer;
        background: white;
      }
      .btn:hover {
        background-color: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>📚 도서 대출 관리 시스템</h2>
      <!-- 비로그인 상태 -->
      <div sec:authorize="isAnonymous()">
        <a class="btn" th:href="@{/member/login}">로그인</a>
        <a class="btn" th:href="@{/member/register}">회원가입</a>
      </div>

      <!--로그인 상태-->
      <div sec:authorize="isAuthenticated()">
        <a class="btn" th:href="@{/member/myPage}">마이페이지</a>
        <form
          th:action="@{/member/logout}"
          method="post"
          style="display: inline"
        >
          <button class="btn" type="submit">로그아웃</button>
        </form>
      </div>
    </div>

    <!-- 도서 목록으로 바로 이동 -->
    <div>
      <a th:href="@{/book/list}">📖 도서 목록 보기</a>
    </div>
  </body>
</html>
