<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>회원가입</title>
  </head>
  <body>
    <h2>회원가입</h2>

    <div th:if="${errorMsg}" style="color: red" th:text="${errorMsg}"></div>

    <form th:action="@{/member/register}" method="post" th:object="${memberVO}">
      <div>
        <label>
          아이디:
          <input type="text" th:field="*{memberId}" id="memberId" />
          <button type="button" onclick="checkId()">중복확인</button>
          <span id="idCheckMsg"></span>
        </label>
      </div>
      <div>
        <label>비밀번호: <input type="password" th:field="*{memberPw}"/></label>
      </div>
      <div>
        <label>이름: <input type="text" th:field="*{memberName}"/></label>
      </div>
      <div>
        <label>주소: <input type="text" th:field="*{memberAddr}"/></label></label>
      </div>
      <div>
        <label>연락처: <input type="text" th:field="*{memberTel}"/></label></label>
      </div>
      <button type="submit">가입하기</button>
    </form>

    <script>
    function checkId() {
        const memberId = document.getElementById('memberId').value;
        if (!memberId) {alert('아이디를 입력해주세요.'); return;}

        fetch('/member/checkId?memberId=' + memberId)
            .then(res => res.json())
            .then(duplication => {
                const msg = document.getElementById('idCheckMsg');
                if (duplication) {
                    msg.style.color = 'red';
                    msg.textContent = '이미 사용 중인 아이디입니다.';
                } else {
                    msg.style.color = 'green';
                    msg.textContent = '사용 가능한 아이디입니다.';
                }
            })
    }
    </script>
  </body>
</html>
