<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  xmlns:egov="http://www.egovframe.go.kr/tags"
>
  <head>
    <title>도서 목록</title>
    <link rel="stylesheet" th:href="@{/css/pagination.css}" />
    <style>
      table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }
      th:nth-child(1) {
        width: 5%;
      } /* 번호 */
      th:nth-child(2) {
        width: 35%;
      } /* 도서명 */
      th:nth-child(3) {
        width: 15%;
      } /* 저자 */
      th:nth-child(4) {
        width: 15%;
      } /* 출판사 */
      th:nth-child(5) {
        width: 20%;
      } /* 등록일 */
      th:nth-child(6) {
        width: 10%;
      } /* 관리 */

      td {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h2>도서 목록</h2>

    <div
      th:if="${successMsg}"
      style="color: green"
      th:text="${successMsg}"
    ></div>

    <!--관리자만 등록 버튼 표시-->
    <a th:href="@{/book/register}" sec:authorize="hasRole('ADMIN')"
      >도서 등록</a
    >

    <!--검색 폼-->
    <form th:action="@{/book/list}" method="get">
      <select name="searchCondition">
        <option
          value="title"
          th:selected="${bookVO.searchCondition == 'title'}"
        >
          도서명
        </option>
        <option
          value="author"
          th:selected="${bookVO.searchCondition == 'author'}"
        >
          저자
        </option>
        <option
          value="publisher"
          th:selected="${bookVO.searchCondition == 'publisher'}"
        >
          출판사
        </option>
      </select>
      <input
        type="text"
        name="searchKeyword"
        th:value="${bookVO.searchKeyword}"
        placeholder="검색어를 입력하세요"
      />
      <button type="submit">검색</button>
      <a th:href="@{/book/list}">초기화</a>
    </form>

    <table border="1">
      <tr>
        <th>번호</th>
        <th>도서명</th>
        <th>저자</th>
        <th>출판사</th>
        <th>등록일</th>
        <th sec:authorize="hasRole('ADMIN')">관리</th>
      </tr>
      <tr th:each="book : ${bookList}">
        <td th:text="${book.bookNo}"></td>
        <td th:text="${book.bookTitle}"></td>
        <td th:text="${book.bookAuthor}"></td>
        <td th:text="${book.bookPublisher}"></td>
        <td th:text="${book.registDate}"></td>
        <td sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/book/update/{bookNo}(bookNo=${book.bookNo})}">수정</a>
          <form
            th:action="@{/book/delete/{bookNo}(bookNo=${book.bookNo})}"
            method="post"
            style="display: inline"
          >
            <button
              type="submit"
              onclick="return confirm('삭제하시겠습니까?');"
            >
              삭제
            </button>
          </form>
        </td>
      </tr>
    </table>

    <div
      class="pagination"
      th:utext="${#egovKrdsPaginationRenderer.renderPagination(paginationInfo, 'linkPage')}"
    ></div>

    <script>
      function linkPage(pageNo) {
        const searchCondition = document.querySelector(
          'select[name="searchCondition"]',
        ).value;
        const searchKeyword = document.querySelector(
          'input[name="searchKeyword"]',
        ).value;
        location.href =
          "/book/list?pageIndex=" +
          pageNo +
          "&searchCondition=" +
          searchCondition +
          "&searchKeyword=" +
          encodeURIComponent(searchKeyword);
      }
    </script>
  </body>
</html>
