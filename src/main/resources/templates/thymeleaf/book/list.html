<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>도서 목록</title>
    <link rel="stylesheet" th:href="@{/css/pagination.css}" />
    <style>
      /* 헤더 */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #ddd;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .header-buttons {
        display: flex;
        gap: 10px;
      }
      .btn {
        padding: 7px 15px;
        text-decoration: none;
        border: 1px solid #333;
        color: #333;
        cursor: pointer;
        background: white;
      }
      .btn:hover {
        background-color: #f0f0f0;
      }

      /* 테이블 */
      table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }
      th:nth-child(1) {
        width: 5%;
      } /* 번호 */
      th:nth-child(2) {
        width: 40%;
      } /* 도서명 - 관리 컬럼 없어졌으니 늘림 */
      th:nth-child(3) {
        width: 20%;
      } /* 저자 */
      th:nth-child(4) {
        width: 20%;
      } /* 출판사 */

      td {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <!-- 헤더 fragment 삽입 -->
    <div th:replace="~{common/header :: header}"></div>

    <h2>도서 목록</h2>

    <form th:action="@{/book/list}" method="get">
      <select name="searchCondition">
        <option
          value="title"
          th:selected="${bookVO.searchCondition == 'title'}"
        >
          도서명
        </option>
        <option
          value="author"
          th:selected="${bookVO.searchCondition == 'author'}"
        >
          저자
        </option>
        <option
          value="publisher"
          th:selected="${bookVO.searchCondition == 'publisher'}"
        >
          출판사
        </option>
      </select>
      <input
        type="text"
        name="searchKeyword"
        th:value="${bookVO.searchKeyword}"
        placeholder="검색어를 입력하세요"
      />
      <button type="submit">검색</button>
      <a th:href="@{/book/list}">초기화</a>
    </form>

    <table border="1">
      <tr>
        <th>번호</th>
        <th>도서명</th>
        <th>저자</th>
        <th>출판사</th>
      </tr>
      <tr th:each="book : ${bookList}">
        <td th:text="${book.bookNo}"></td>
        <td>
          <a
            th:href="@{/book/detail/{bookNo}(bookNo=${book.bookNo})}"
            th:text="${book.bookTitle}"
          ></a>
        </td>
        <td th:text="${book.bookAuthor}"></td>
        <td th:text="${book.bookPublisher}"></td>
      </tr>
    </table>

    <div
      class="pagination"
      th:utext="${#egovKrdsPaginationRenderer.renderPagination(paginationInfo, 'linkPage')}"
    ></div>

    <script>
      function linkPage(pageNo) {
        const searchCondition = document.querySelector(
          'select[name="searchCondition"]',
        ).value;
        const searchKeyword = document.querySelector(
          'input[name="searchKeyword"]',
        ).value;
        location.href =
          "/book/list?pageIndex=" +
          pageNo +
          "&searchCondition=" +
          searchCondition +
          "&searchKeyword=" +
          encodeURIComponent(searchKeyword);
      }
    </script>
  </body>
</html>
